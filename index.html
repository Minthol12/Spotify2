<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #1db954;
            --green-bright: #1ed760;
            --bg: #0a0a0a;
            --surface: #111111;
            --surface2: #181818;
            --surface3: #222222;
            --border: #2a2a2a;
            --text: #ffffff;
            --muted: #727272;
            --muted2: #404040;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        .app {
            display: grid;
            grid-template-columns: 260px 1fr;
            grid-template-rows: 1fr 88px;
            height: 100vh;
            gap: 6px;
            padding: 6px;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            grid-row: 1 / 2;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
        }

        .logo-box {
            background: var(--surface);
            border-radius: 10px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
        }
        .logo-box svg { width: 28px; height: 28px; fill: var(--green); }
        .logo-box span { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }

        .nav-box {
            background: var(--surface);
            border-radius: 10px;
            padding: 10px;
            border: 1px solid var(--border);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--muted);
            font-weight: 600;
            font-size: 13px;
            transition: all 0.15s;
            text-decoration: none;
        }
        .nav-item:hover { color: var(--text); background: var(--surface3); }
        .nav-item.active { color: var(--text); }
        .nav-item svg { width: 20px; height: 20px; fill: currentColor; flex-shrink: 0; }

        .library-box {
            background: var(--surface);
            border-radius: 10px;
            padding: 12px;
            border: 1px solid var(--border);
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .library-box::-webkit-scrollbar { width: 4px; }
        .library-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .lib-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 8px 10px;
        }
        .lib-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .lib-header-left svg { width: 18px; height: 18px; fill: currentColor; }

        .lib-header button {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .lib-header button:hover { color: var(--text); background: var(--surface3); }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .playlist-item:hover { background: var(--surface3); }
        .playlist-item.active { background: var(--surface3); }

        .pl-thumb {
            width: 42px; height: 42px;
            border-radius: 4px;
            background: var(--surface3);
            flex-shrink: 0;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .pl-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .pl-thumb svg { width: 18px; height: 18px; fill: var(--muted); }

        .pl-info { overflow: hidden; }
        .pl-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pl-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }

        /* ── MAIN ── */
        .main {
            background: var(--surface);
            border-radius: 10px;
            margin: 0;
            overflow-y: auto;
            position: relative;
            border: 1px solid var(--border);
        }
        .main::-webkit-scrollbar { width: 6px; }
        .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .main-header {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: rgba(17,17,17,0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            gap: 16px;
        }

        .search-wrap {
            flex: 1;
            max-width: 340px;
            position: relative;
        }
        .search-wrap svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px; height: 16px;
            fill: var(--muted);
            pointer-events: none;
        }
        #search-input {
            width: 100%;
            background: var(--surface3);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 14px 8px 36px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s;
        }
        #search-input::placeholder { color: var(--muted); }
        #search-input:focus { border-color: var(--green); }

        .header-right { display: flex; align-items: center; gap: 10px; }
        .user-avatar {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: var(--surface3);
            border: 2px solid var(--green);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700;
            cursor: pointer;
            color: var(--green);
        }

        /* ── HERO ── */
        .playlist-hero {
            padding: 32px 24px 20px;
            display: flex;
            align-items: flex-end;
            gap: 22px;
            background: linear-gradient(160deg, #0d2016 0%, #111 60%);
            min-height: 240px;
        }

        .hero-art {
            width: 180px; height: 180px;
            border-radius: 6px;
            background: var(--surface3);
            flex-shrink: 0;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .hero-art img { width: 100%; height: 100%; object-fit: cover; }
        .hero-art svg { width: 56px; height: 56px; fill: var(--muted); }

        .hero-info { flex: 1; }
        .hero-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--green); margin-bottom: 6px; }
        .hero-title {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1;
            margin-bottom: 10px;
        }
        .hero-desc { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
        .hero-stats { font-size: 13px; color: var(--muted); }
        .hero-stats span { color: var(--text); font-weight: 600; }

        /* ── CONTROLS ── */
        .controls-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 18px 24px;
        }
        .big-play {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: var(--green);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.1s;
            flex-shrink: 0;
        }
        .big-play:hover { transform: scale(1.06); background: var(--green-bright); }
        .big-play svg { width: 20px; height: 20px; fill: #000; margin-left: 2px; }

        .icon-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            transition: color 0.15s;
            border-radius: 4px;
        }
        .icon-btn:hover { color: var(--text); }
        .icon-btn.active { color: var(--green); }
        .icon-btn svg { width: 20px; height: 20px; fill: currentColor; }

        .song-count-badge {
            margin-left: auto;
            font-size: 12px;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
        }

        /* ── TRACK LIST ── */
        .track-list { padding: 0 16px 100px; }

        .track-list-header {
            display: grid;
            grid-template-columns: 44px 1fr 160px 60px;
            gap: 12px;
            padding: 0 12px 8px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .track-list-header .col-dur { text-align: right; }

        .track-row {
            display: grid;
            grid-template-columns: 44px 1fr 160px 60px;
            gap: 12px;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.12s;
            align-items: center;
        }
        .track-row:hover { background: var(--surface3); }
        .track-row.playing { background: rgba(29,185,84,0.08); }
        .track-row.playing .track-num { color: var(--green); }
        .track-row.playing .t-title { color: var(--green); }

        .track-num {
            font-size: 13px;
            color: var(--muted);
            text-align: center;
            font-family: 'Space Mono', monospace;
            position: relative;
        }
        .track-num .num { display: block; }
        .track-num .pi { display: none; }
        .track-row:hover .track-num .num { display: none; }
        .track-row:hover .track-num .pi { display: flex; align-items: center; justify-content: center; }
        .track-row.playing .track-num .num { display: none; }
        .track-row.playing .track-num .pi { display: flex; align-items: center; justify-content: center; }

        .t-info { display: flex; align-items: center; gap: 11px; overflow: hidden; min-width: 0; }
        .t-art {
            width: 38px; height: 38px;
            border-radius: 4px;
            background: var(--surface3);
            flex-shrink: 0;
            overflow: hidden;
        }
        .t-art img { width: 100%; height: 100%; object-fit: cover; }

        .t-details { overflow: hidden; min-width: 0; }
        .t-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .t-artist { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .t-album { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .t-dur { font-size: 12px; color: var(--muted); text-align: right; font-family: 'Space Mono', monospace; }

        .no-results {
            text-align: center;
            padding: 60px 24px;
            color: var(--muted);
        }
        .no-results h3 { font-size: 20px; color: var(--text); margin-bottom: 8px; }

        /* ── PLAYER ── */
        .player {
            grid-column: 1 / -1;
            background: #0d0d0d;
            border: 1px solid var(--border);
            border-radius: 10px;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            padding: 0 18px;
            height: 88px;
        }

        .player-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .player-art {
            width: 52px; height: 52px;
            border-radius: 5px;
            background: var(--surface3);
            overflow: hidden; flex-shrink: 0;
        }
        .player-art img { width: 100%; height: 100%; object-fit: cover; }
        .player-ti { overflow: hidden; min-width: 0; }
        .player-name {
            font-size: 13px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            cursor: pointer;
        }
        .player-name:hover { text-decoration: underline; }
        .player-artist { font-size: 11px; color: var(--muted); margin-top: 2px; cursor: pointer; }
        .player-artist:hover { color: var(--text); text-decoration: underline; }

        .p-heart { background: none; border: none; color: var(--muted); cursor: pointer; margin-left: 6px; padding: 4px; }
        .p-heart:hover { color: var(--text); }
        .p-heart svg { width: 15px; height: 15px; fill: currentColor; }

        .player-center { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .player-controls { display: flex; align-items: center; gap: 12px; }
        .player-controls button {
            background: none; border: none;
            color: var(--muted); cursor: pointer;
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            transition: color 0.15s; border-radius: 4px;
        }
        .player-controls button:hover { color: var(--text); }
        .player-controls button svg { width: 15px; height: 15px; fill: currentColor; }

        .p-play-btn {
            width: 30px !important; height: 30px !important;
            background: var(--text) !important;
            border-radius: 50% !important;
            color: #000 !important;
        }
        .p-play-btn:hover { transform: scale(1.08); }
        .p-play-btn svg { fill: #000 !important; }

        .p-progress { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 500px; }
        .p-time { font-size: 10px; color: var(--muted); min-width: 32px; font-family: 'Space Mono', monospace; }
        .p-time.right { text-align: right; }

        .prog-bar {
            flex: 1; height: 3px;
            background: var(--surface3);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .prog-bar:hover { height: 5px; }
        .prog-fill {
            height: 100%; background: var(--text);
            border-radius: 2px;
            transition: width 0.1s linear;
        }
        .prog-bar:hover .prog-fill { background: var(--green); }
        .prog-fill::after {
            content: '';
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--text);
            position: absolute;
            right: -5px; top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            transition: opacity 0.1s;
        }
        .prog-bar:hover .prog-fill::after { opacity: 1; }

        .player-right { display: flex; align-items: center; justify-content: flex-end; gap: 6px; }
        .player-right button {
            background: none; border: none;
            color: var(--muted); cursor: pointer;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            transition: color 0.15s;
        }
        .player-right button:hover { color: var(--text); }
        .player-right button svg { width: 15px; height: 15px; fill: currentColor; }

        .vol-bar {
            width: 80px; height: 3px;
            background: var(--surface3);
            border-radius: 2px; cursor: pointer;
        }
        .vol-bar:hover { height: 5px; }
        .vol-fill { height: 100%; background: var(--text); border-radius: 2px; width: 70%; }
        .vol-bar:hover .vol-fill { background: var(--green); }

        @media (max-width: 768px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo-box">

            <span>Spotify</span>
        </div>

        <div class="nav-box">

                </button>
            </div>
            <div id="playlist-list"></div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main" id="main-content">
        <div class="main-header">
            <div class="search-wrap">
                <svg viewBox="0 0 24 24"><path d="M10.533 1.279c-5.18 0-9.407 4.14-9.407 9.279s4.226 9.279 9.407 9.279c2.234 0 4.29-.77 5.907-2.058l4.353 4.353a1 1 0 1 0 1.414-1.414l-4.344-4.344a9.157 9.157 0 0 0 2.077-5.816c0-5.14-4.226-9.28-9.407-9.28zm-7.407 9.28c0-4.006 3.302-7.28 7.407-7.28s7.407 3.274 7.407 7.28-3.302 7.279-7.407 7.279-7.407-3.273-7.407-7.28z"/></svg>

        <div id="content-area"></div>

    <!-- PLAYER -->
    <div class="player">
        <div class="player-left">
            <div class="player-art" id="player-art"></div>
            <div class="player-ti">
                <div class="player-name" id="player-track-name">—</div>

        <div class="player-center">
            <div class="player-controls">

   PLAYLISTS
   ══════════════════════════════════════════ */
let playlists = [
    {
        name: "All Songs",
        desc: "Your full library",
        cover: COVERS[5],
        songIds: songs.map((_, i) => i)
    },
];

/* ══════════════════════════════════════════
   STATE
   ══════════════════════════════════════════ */
let currentTrackIndex = -1;
let currentPlaylist = 0;
let isPlaying = false;
let isShuffled = false;
let repeatMode = 0;
let searchQuery = '';
let shuffleOrder = [];

const audio = document.getElementById('audio-player');

function formatTime(sec) {
    if (isNaN(sec) || sec < 0) return '0:00';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}

function getCurrentSongs() {
    const pl = playlists[currentPlaylist];
    if (!pl) return songs;
    return pl.songIds.map(i => songs[i]).filter(Boolean);
}

function getFilteredSongs() {
    const all = getCurrentSongs();
    if (!searchQuery) return all;
    const q = searchQuery.toLowerCase();
    return all.filter(s =>
        s.title.toLowerCase().includes(q) ||
        s.artist.toLowerCase().includes(q) ||
        s.album.toLowerCase().includes(q)
    );
}

// Maps filtered index → real playlist index
function filteredIndexToReal(filteredIdx) {
    const allSongs = getCurrentSongs();
    const filtered = getFilteredSongs();
    const song = filtered[filteredIdx];
    return allSongs.indexOf(song);
}

function handleSearch(val) {
    searchQuery = val;
    renderContent();
}

/* ── RENDER ── */
function renderSidebar() {
    const list = document.getElementById('playlist-list');
    list.innerHTML = '';
    playlists.forEach((pl, i) => {
        const el = document.createElement('div');
        el.className = 'playlist-item' + (i === currentPlaylist ? ' active' : '');
        el.onclick = () => { currentPlaylist = i; currentTrackIndex = -1; searchQuery = ''; document.getElementById('search-input').value = ''; renderAll(); };
        el.innerHTML = `
            <div class="pl-thumb">${pl.cover ? `<img src="${pl.cover}" alt="">` : `<svg viewBox="0 0 24 24"><path d="M6 3h15v15.167a3.5 3.5 0 1 1-3.5-3.5H19V5H8v10.167a3.5 3.5 0 1 1-3.5-3.5H6V3z"/></svg>`}</div>
            <div class="pl-info">
                <div class="pl-name">${pl.name}</div>
                <div class="pl-meta">Playlist · ${pl.songIds.length} songs</div>
            </div>`;
        list.appendChild(el);
    });
}

function renderContent() {
    const area = document.getElementById('content-area');
    const pl = playlists[currentPlaylist] || { name: 'All Songs', desc: '', cover: '', songIds: [] };
    const allSongs = getCurrentSongs();
    const filteredSongs = getFilteredSongs();

    let tracksHTML = '';
    if (filteredSongs.length === 0) {
        tracksHTML = `<div class="no-results"><h3>No results</h3><p>Try a different search term.</p></div>`;
    } else {
        filteredSongs.forEach((song, fi) => {
            const realIdx = allSongs.indexOf(song);
            const isActive = realIdx === currentTrackIndex;
            const playIconColor = isActive ? '#1db954' : '#fff';
            tracksHTML += `
            <div class="track-row ${isActive ? 'playing' : ''}" onclick="playTrackByReal(${realIdx})">
                <div class="track-num">
                    <span class="num">${fi + 1}</span>
                    <span class="pi">
                        <svg viewBox="0 0 16 16" width="13" height="13">
                            ${isActive && isPlaying
                                ? `<rect x="3" y="2" width="3" height="12" rx=".5" fill="${playIconColor}"/><rect x="9" y="2" width="3" height="12" rx=".5" fill="${playIconColor}"/>`
                                : `<path d="M3 1.713a.7.7 0 0 1 1.05-.607l10.89 6.288a.7.7 0 0 1 0 1.212L4.05 14.894A.7.7 0 0 1 3 14.288V1.713z" fill="${playIconColor}"/>`
                            }
                        </svg>
                    </span>
                </div>
                <div class="t-info">
                    <div class="t-art"><img src="${song.cover}" alt="" loading="lazy" onerror="this.style.opacity='0'"></div>
                    <div class="t-details">
                        <div class="t-title">${song.title}</div>
                        <div class="t-artist">${song.artist}</div>
                    </div>
                </div>
                <div class="t-album">${song.album || song.artist}</div>
                <div class="t-dur">${song.duration || '—'}</div>
            </div>`;
        });
    }

    const isPlayingAll = isPlaying && currentTrackIndex >= 0;

    area.innerHTML = `
        <div class="playlist-hero">
            <div class="hero-art">
                ${pl.cover ? `<img src="${pl.cover}" alt="">` : `<svg viewBox="0 0 24 24"><path d="M6 3h15v15.167a3.5 3.5 0 1 1-3.5-3.5H19V5H8v10.167a3.5 3.5 0 1 1-3.5-3.5H6V3z"/></svg>`}
            </div>
            <div class="hero-info">
                <div class="hero-label">Playlist</div>
                <h1 class="hero-title">${pl.name}</h1>
                <div class="hero-desc">${pl.desc}</div>
                <div class="hero-stats"><span>You</span> · ${allSongs.length} songs</div>
            </div>
        </div>
        <div class="controls-bar">
            <button class="big-play" onclick="togglePlayAll()">
                <svg viewBox="0 0 16 16">
                    ${isPlayingAll
                        ? '<rect x="3.5" y="2" width="3" height="12" rx=".5"/><rect x="9.5" y="2" width="3" height="12" rx=".5"/>'
                        : '<path d="M3 1.713a.7.7 0 0 1 1.05-.607l10.89 6.288a.7.7 0 0 1 0 1.212L4.05 14.894A.7.7 0 0 1 3 14.288V1.713z"/>'}
                </svg>
            </button>
            <button class="icon-btn ${isShuffled ? 'active' : ''}" onclick="toggleShuffle()" title="Shuffle">
                <svg viewBox="0 0 16 16"><path d="M13.151.922a.75.75 0 1 0-1.06 1.06L13.109 3H11.16a3.75 3.75 0 0 0-2.873 1.34l-6.173 7.356A2.25 2.25 0 0 1 .39 12.5H0V14h.391a3.75 3.75 0 0 0 2.873-1.34l6.173-7.356a2.25 2.25 0 0 1 1.724-.804h1.947l-1.017 1.018a.75.75 0 0 0 1.06 1.06l2.306-2.306a.75.75 0 0 0 0-1.06L13.15.922zM.391 3.5H0V2h.391c1.109 0 2.16.49 2.873 1.34L4.89 5.277l-.979 1.167-1.796-2.14A2.25 2.25 0 0 0 .39 3.5z"/><path d="m7.5 10.723.98-1.167 1.796 2.14a2.25 2.25 0 0 0 1.724.804h1.947l-1.017-1.018a.75.75 0 1 1 1.06-1.06l2.306 2.306a.75.75 0 0 1 0 1.06L13.15 16.06a.75.75 0 1 1-1.06-1.06l1.018-1.018H11.16a3.75 3.75 0 0 1-2.873-1.34L7.5 10.723z"/></svg>
            </button>
            <span class="song-count-badge">${filteredSongs.length === allSongs.length ? allSongs.length + ' tracks' : filteredSongs.length + ' / ' + allSongs.length + ' tracks'}</span>
        </div>
        <div class="track-list">
            <div class="track-list-header">
                <div>#</div><div>Title</div><div>Artist / Album</div><div class="col-dur">Time</div>
            </div>
            ${tracksHTML}
        </div>`;
}

function renderAll() {
    renderSidebar();
    renderContent();
}

/* ── PLAYBACK ── */
function playTrackByReal(realIdx) {
    const currentSongs = getCurrentSongs();
    if (realIdx < 0 || realIdx >= currentSongs.length) return;

    // If clicking currently playing track, toggle pause
    if (realIdx === currentTrackIndex && audio.src) {
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
        } else {
            audio.play().catch(() => {});
            isPlaying = true;
        }
        updatePlayIcon();
        renderContent();
        return;
    }

    currentTrackIndex = realIdx;
    const song = currentSongs[realIdx];
    audio.src = song.src;
    audio.load();
    audio.play().catch(() => {});
    isPlaying = true;

    document.getElementById('player-track-name').textContent = song.title;
    document.getElementById('player-track-artist').textContent = song.artist;
    const artEl = document.getElementById('player-art');
    artEl.innerHTML = song.cover ? `<img src="${song.cover}" alt="">` : '';

    updatePlayIcon();
    renderContent();
}

function togglePlay() {
    if (currentTrackIndex < 0) { playTrackByReal(0); return; }
    if (isPlaying) { audio.pause(); isPlaying = false; }
    else { audio.play().catch(() => {}); isPlaying = true; }
    updatePlayIcon();
    renderContent();
}

function togglePlayAll() {
    if (currentTrackIndex < 0) { playTrackByReal(0); }
    else { togglePlay(); }
}

function nextTrack() {
    const songs = getCurrentSongs();
    if (!songs.length) return;
    if (isShuffled && shuffleOrder.length) {
        const idx = shuffleOrder.indexOf(currentTrackIndex);
        const next = shuffleOrder[(idx + 1) % shuffleOrder.length];
        playTrackByReal(next);
    } else {
        playTrackByReal((currentTrackIndex + 1) % songs.length);
    }
}

function prevTrack() {
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    const songs = getCurrentSongs();
    if (!songs.length) return;
    let prev = currentTrackIndex - 1;
    if (prev < 0) prev = songs.length - 1;
    playTrackByReal(prev);
}

function toggleShuffle() {
    isShuffled = !isShuffled;
    if (isShuffled) {
        shuffleOrder = [...getCurrentSongs().keys()].sort(() => Math.random() - 0.5);
    }
    document.getElementById('shuffle-btn').style.color = isShuffled ? 'var(--green)' : '';
    renderContent();
}

function toggleRepeat() {
    repeatMode = (repeatMode + 1) % 3;
    const btn = document.getElementById('repeat-btn');
    btn.style.color = repeatMode > 0 ? 'var(--green)' : '';
}

function updatePlayIcon() {
    const icon = document.getElementById('play-icon');
    if (isPlaying) {
        icon.innerHTML = '<rect x="3.5" y="2" width="3" height="12" rx=".5"/><rect x="9.5" y="2" width="3" height="12" rx=".5"/>';
    } else {
        icon.innerHTML = '<path d="M3 1.713a.7.7 0 0 1 1.05-.607l10.89 6.288a.7.7 0 0 1 0 1.212L4.05 14.894A.7.7 0 0 1 3 14.288V1.713z"/>';
    }
}

function seekTrack(e) {
    const bar = document.getElementById('progress-bar');
    const rect = bar.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    if (audio.duration) audio.currentTime = pct * audio.duration;
}

function setVolume(e) {
    const bar = document.getElementById('volume-bar');
    const rect = bar.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    audio.volume = pct;
    document.getElementById('volume-fill').style.width = (pct * 100) + '%';
}

function toggleMute() {
    audio.muted = !audio.muted;
    document.getElementById('volume-fill').style.width = audio.muted ? '0%' : (audio.volume * 100) + '%';
}

function createPlaylist() {
    const name = prompt('Playlist name:');
    if (!name) return;
    playlists.push({ name, desc: '', cover: '', songIds: [] });
    currentPlaylist = playlists.length - 1;
    renderAll();
}

/* ── EVENTS ── */
audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('current-time').textContent = formatTime(audio.currentTime);
    document.getElementById('total-time').textContent = formatTime(audio.duration);
});

audio.addEventListener('ended', () => {
    if (repeatMode === 2) { audio.currentTime = 0; audio.play(); }
    else { nextTrack(); }
});

document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowRight' && e.shiftKey) nextTrack();
    if (e.code === 'ArrowLeft' && e.shiftKey) prevTrack();
});

renderAll();
</script>
</body>
</html>
